<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro'yxatdan O'tish</title>
<style>
    body{
  font-family:'Segoe UI',sans-serif;
  background:#a0e7e5;
  margin:0;
  padding:20px;
}

.wrapper{
  width:100%;
  max-width:1300px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.form-box{
  width:30%;
  background:#ffffff;
  padding:20px 25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  margin-left: 400px;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#333;
}

input,select{
  width:100%;
  padding:10px 12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
  transition:0.3s;
  font-size:14px;
}

input:focus,select:focus{
  outline:none;
  border-color:#5f6ddf;
  box-shadow:0 0 8px rgba(95,109,223,0.4);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(to right,#5f6ddf,#7f8cff);
  color:white;
  margin-top:12px;
}

.list-box{
  width:100%;
  background:#ffffff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
  overflow-x:auto;
}

.header{
  display:flex;
  align-items:center;
  min-width:900px;
  padding:14px 0;
  font-weight:600;
  font-size:14px;
  color:black;
  border-radius:12px;
  margin-bottom:10px;
}

.header .col{
  padding-left:12px;
}

.row{
  display:flex;
  align-items:center;
  min-width:900px;
  padding:12px 0;
  font-size:14px;
  transition:0.2s ease;
  border-radius:10px;
}

.row:nth-child(even){
  background:#f3f5ff;
}

.row:hover{
  background:#e0e5ff;
  transform:scale(1.01);
}

.col{
  flex:1;
  padding-left:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.col.amallar{
  display:flex;
  gap:8px;
}

.action-btn{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  font-size:12px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.edit-btn{
  background:#f6ad55;
  cursor:not-allowed;
}

.delete-btn{
  background:#e53e3e;
}

.delete-btn:hover{
  background:#c53030;
  transform:scale(1.05);
}
</style>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

<div class="form-box">
<h2>Ro'yxatdan O'tish</h2>

<input type="text" id="fullname" placeholder="F.I.Sh">
<input type="tel" id="telefon" placeholder="Telefon raqam">

<select id="jins">
<option value="">Jinsni tanlang</option>
<option>Erkak</option>
<option>Ayol</option>
</select>

<input type="date" id="tugilgan">

<select id="kun">
<option value="">Kunni tanlang</option>
<option>Toq</option>
<option>Juft</option>
</select>

<select id="ertalabpeshin">
<option value="">Vaqt</option>
<option>Ertalab</option>
<option>Peshin</option>
</select>

<select id="fan">
<option value="">Fan tanlang</option>
<option>Matematika</option>
<option>Ingliz tili</option>
<option>Fizika</option>
<option>IT</option>
</select>

<button id="addBtn">Qo'shish</button>
</div>


<div class="list-box">
<div class="header">
<div class="col">F.I.Sh</div>
<div class="col">Tel</div>
<div class="col">Jins</div>
<div class="col yosh">Yosh</div>
<div class="col">Tug‘ilgan sana</div>
<div class="col kunva">Kun</div>
<div class="col kunva">Vaqt</div>
<div class="col fan">Fan</div>  
</div>

<div id="list"></div>
</div>

</div>

<script src="app.js">
</script>

</body>
</html>
